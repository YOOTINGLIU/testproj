<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>螺絲零件管理系統</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .tabs {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 2px solid #ddd;
        }
        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border: 2px solid transparent;
            border-bottom: none;
            font-weight: bold;
            background: #f5f5f5;
            margin-right: 5px;
            border-radius: 5px 5px 0 0;
        }
        .tab.active {
            background: #fff;
            border-color: #ddd;
            border-bottom-color: #fff;
            position: relative;
            top: 2px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
            font-size: 11px;
        }
        th, td {
            padding: 6px;
            text-align: left;
            border: 1px solid #ddd;
            word-wrap: break-word;
            max-width: 150px;
        }
        th {
            background-color: #f2f2f2;
            font-weight: bold;
        }
        .data-container {
            display: none;
        }
        .data-container.active {
            display: block;
        }
        .loading {
            color: #666;
            margin: 20px 0;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>螺絲零件管理系統</h1>
    <div class="tabs">
        <div class="tab active" onclick="switchTab('inventory')">📦 庫存資料</div>
        <div class="tab" onclick="switchTab('shipments')">🚚 出貨表</div>
    </div>

    <!-- 庫存資料 -->
    <div id="inventory" class="data-container active">
        <div id="loading" class="loading">載入庫存資料中...</div>
        <table id="inventory-table" border="1" cellpadding="8" cellspacing="0">
            <thead>
                <tr>
                    <th>規格</th>
                    <th>類型</th>
                    <th>材質</th>
                    <th>數量</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- 出貨表 -->
    <div id="shipments" class="data-container">
        <div id="loading-shipments" class="loading">載出入貨表資料中...</div>
        <table id="shipments-table" border="1" cellpadding="8" cellspacing="0">
            <thead>
                <tr>
                    <th>規格</th>
                    <th>類型</th>
                    <th>數量</th>
                    <th>日期</th>
                    <th>客戶</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <script>
        // 切換 tab 功能
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.data-container').forEach(container => container.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
        }

        // 載入庫存資料（直接使用本地 JSON）
        async function loadInventory() {
            const loading = document.getElementById('loading');
            const table = document.getElementById('inventory-table');
            const tbody = table.querySelector('tbody');

            try {
                const response = await fetch('data.json');
                if (!response.ok) throw new Error('JSON 檔案不存在');
                const data = await response.json();
                renderInventory(data);
            } catch (err) {
                loading.style.display = 'none';
                table.style.display = 'none';
                console.error('載入庫存失敗:', err);
                tbody.innerHTML = '<tr><td colspan="4">⚠️ 載入失敗，檢查 JSON 檔案</td></tr>';
            }
        }

        // 渲染庫存表格
        function renderInventory(data) {
            const tbody = document.getElementById('inventory-table').querySelector('tbody');
            tbody.innerHTML = '';

            if (!Array.isArray(data)) {
                tbody.innerHTML = '<tr><td colspan="4">⚠️ 資料格式錯誤</td></tr>';
                return;
            }

            data.forEach(item => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${item.規格 || item.part_number || item.name || ''}</td>
                    <td>${item.類型 || item.type || ''}</td>
                    <td>${item.材質 || item.material || ''}</td>
                    <td>${item.數量 || item.stock || item.quantity || ''}</td>
                `;
                tbody.appendChild(row);
            });

            loading.style.display = 'none';
            table.style.display = 'table';
        }

        // 載出入貨資料（直接使用本地 JSON）
        async function loadShipments() {
            const loading = document.getElementById('loading-shipments');
            const table = document.getElementById('shipments-table');
            const tbody = table.querySelector('tbody');

            try {
                const response = await fetch('logs.json');
                if (!response.ok) throw new Error('JSON 檔案不存在');
                const data = await response.json();
                renderShipments(data);
            } catch (err) {
                loading.style.display = 'none';
                table.style.display = 'none';
                console.error('載出入貨記錄失敗:', err);
                tbody.innerHTML = '<tr><td colspan="5">⚠️ 載入失敗，檢查 JSON 檔案</td></tr>';
            }
        }

        // 渲染出貨表格
        function renderShipments(data) {
            const tbody = document.getElementById('shipments-table').querySelector('tbody');
            tbody.innerHTML = '';

            if (!Array.isArray(data)) {
                tbody.innerHTML = '<tr><td colspan="5">⚠️ 資料格式錯誤</td></tr>';
                return;
            }

            data.forEach(log => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${log.規格 || log.part_number || log.項目 || ''}</td>
                    <td>${log.類型 || log.log_type || log.type || ''}</td>
                    <td>${log.數量 || log.quantity || log.stock || ''}</td>
                    <td>${log.日期 || log.date || log.date || ''}</td>
                    <td>${log.客戶 || log.customer || log.name || ''}</td>
                `;
                tbody.appendChild(row);
            });

            loading.style.display = 'none';
            table.style.display = 'table';
        }

        // 載入頁面時執行
        loadInventory();
        loadShipments();
    </script>
</body>
</html>
